<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>Kaleidoscope</title>
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <label class="filebtn">
        <input id="fileInput" type="file" accept="image/*" />
        Load
      </label>
      <button id="cameraBtn" type="button">Camera</button>
      <button id="shutterBtn" type="button" disabled>Shutter</button>
      <button id="saveBtn" type="button">JPEG</button>
      <button id="resetBtn" type="button">Reset</button>
    </header>

    <section class="stage-wrap">
      <canvas id="stage" aria-label="Kaleidoscope canvas"></canvas>
      <video id="camera" playsinline autoplay muted hidden></video>
      <div id="emptyState" class="empty">
        <div>Load an image or open camera</div>
        <div class="sub">36 slices / drag to move center</div>
      </div>
    </section>

    <section class="controls">
      <label>Zoom
        <input id="zoom" type="range" min="0.6" max="3.5" step="0.01" value="1.35" />
      </label>
      <label>Rotate
        <input id="rotate" type="range" min="-180" max="180" step="1" value="0" />
      </label>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
